# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Deploy to Ubuntu Server

on:
  push:
    branches: [main]

env:
  DO_NOT_USE_ENV_FILE: true
  PORT: 5000
  DB_HOST: ${{ secrets.databaseHost }}
  DB_NAME: ${{ secrets.databaseName }}
  DB_USER_ID: ${{ secrets.databaseAuthID }}
  DB_USER_PW: ${{ secrets.databaseAuthPW }}

jobs:
  env:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: pm2 delete all
      - run: ./genEnvSetupFile.sh $DO_NOT_USE_ENV_FILE $PORT $DB_HOST $DB_NAME $DB_USER_ID $DB_USER_PW
      - run: pm2 start __generated_environment.js -env-production
  build:
    runs-on: self-hosted
    steps:
      - run: yarn install
      - run: yarn build
      - run: yarn copy
      - run: yarn start
