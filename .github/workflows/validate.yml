# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Validate Project Before Merge

on:
  pull_request:
    branches: [main]

env:
  DO_NOT_USE_ENV_FILE: true
  PORT: 5000
  DB_HOST: ${{ secrets.databaseHost }}
  DB_NAME: ${{ secrets.databaseName }}
  DB_USER_ID: ${{ secrets.databaseAuthID }}
  DB_USER_PW: ${{ secrets.databaseAuthPW }}

jobs:
  test:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install; npm install pm2 -g; pm2 update # install dependency
      - run: echo "console.log('hello')" >> temp.js; pm2 start temp.js; pm2 delete all; # stop all started process
      - run: chmod +x genEnvSetupFile.sh; ./genEnvSetupFile.sh $DO_NOT_USE_ENV_FILE $PORT $DB_HOST $DB_NAME $DB_USER_ID $DB_USER_PW # generate pm2 env config js file
      - run: pm2 start __generated_environment.js # load env valuables to pm2 process
      - run: yarn build
      - run: yarn copy
      - run: yarn deploy
